name: Release

# Triggered by pushing a tag like v0.1.0. Pipeline order:
#   build → publish-pypi → gh-release → bump-tap
# bump-tap is invoked as a reusable workflow (workflow_call) rather
# than via `on: release: published`, because GitHub suppresses
# downstream events caused by GITHUB_TOKEN — softprops/action-gh-release
# uses GITHUB_TOKEN, so the release event never fires for our automated
# releases. Calling the reusable workflow directly avoids that.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # needed for the GitHub Release upload.

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (Trusted Publishers)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/blemees-agent
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  gh-release:
    name: Attach to GitHub Release
    # Runs after PyPI so the release object only materialises once the
    # wheel is installable from PyPI.
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  bump-tap:
    name: Bump Homebrew tap
    # Last step in the pipeline. Uses the reusable workflow so we get
    # to keep bump-tap.yml's standalone workflow_dispatch entry point
    # for manual re-syncs.
    needs: gh-release
    uses: ./.github/workflows/bump-tap.yml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
