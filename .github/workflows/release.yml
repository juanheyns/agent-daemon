name: Release

# Triggered by pushing a tag like v0.1.0. Pipeline order:
#   build → publish-pypi → gh-release
# The GitHub Release is intentionally the last step so that downstream
# automation listening on `release: published` (e.g. bump-tap.yml) only
# fires after PyPI is green. If PyPI publish fails the release is not
# created and the tap is not bumped — the package stays consistent
# across channels.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # needed for the GitHub Release upload.

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (Trusted Publishers)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/blemees
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  gh-release:
    name: Attach to GitHub Release
    # Run after PyPI so downstream automation listening on
    # `release: published` (bump-tap.yml) only fires once the wheel is
    # actually installable from PyPI.
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
