name: Bump Homebrew tap

# Called from release.yml after gh-release succeeds. Also runnable
# manually via workflow_dispatch (useful for re-syncing the tap to an
# existing tag, e.g. after an out-of-band formula edit).
#
# Why workflow_call instead of `on: release: published`? Events caused
# by GITHUB_TOKEN — including the release object created by
# softprops/action-gh-release in release.yml — are deliberately
# suppressed by GitHub to prevent workflow loops. So the
# `release: published` event never fires for our automated releases.
# Driving this directly from release.yml via workflow_call avoids
# the suppression entirely.
#
# Secret required: TAP_GITHUB_TOKEN
#   A fine-grained PAT (or GitHub App installation token) scoped to
#   the blemees/homebrew-tap repo with permissions:
#     Contents: Read and write
#   Add at: Settings → Secrets and variables → Actions → New repository secret.

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag (e.g. v0.6.0) to bump the tap to."
        type: string
        required: true
    secrets:
      TAP_GITHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag (e.g. v0.6.0) to bump the tap to."
        required: true

permissions: {}

jobs:
  bump:
    name: Update tap formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: blemees/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Compute url + sha256 and rewrite formula
        env:
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "${TAG:-}" ]]; then
            echo "::error::Missing tag input"
            exit 1
          fi
          URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "url=$URL"
          echo "sha256=$SHA256"
          python3 - "$URL" "$SHA256" <<'PY'
          import pathlib, re, sys
          url, sha = sys.argv[1], sys.argv[2]
          p = pathlib.Path("tap/Formula/blemees-agent.rb")
          text = p.read_text()
          text, n_url = re.subn(r'url "[^"]+"', f'url "{url}"', text, count=1)
          text, n_sha = re.subn(r'sha256 "[^"]+"', f'sha256 "{sha}"', text, count=1)
          if n_url != 1 or n_sha != 1:
              raise SystemExit(
                  f"Formula shape unexpected: url replacements={n_url}, sha256 replacements={n_sha}"
              )
          p.write_text(text)
          PY

      - name: Commit and push
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            echo "Formula already points at ${TAG}; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/blemees-agent.rb
          git commit -m "Bump blemees-agent to ${TAG}"
          git push origin HEAD:main
